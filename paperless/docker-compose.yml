  #   image: clusterzx/paperless-ai:latest
  #   restart: unless-stopped
  #   depends_on:
  #     - webserver
  #   ports:
  #     - "8011:3000"
  #   volumes:
  #     - /mnt/ssd/homelab/paperless/paperless-ai:/app/data
  #   environment:
  #     PAPERLESS_API_URL: http://paperless-webserver:8000/api
  #     PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN}
