services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - 3001:3001
    volumes:
      - /mnt/ssd/homelab/monitoring/uptime-kuma:/app/data
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true