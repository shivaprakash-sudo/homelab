services:

  backend:
    build: ./backend
    container_name: dlpx-backend
    restart: unless-stopped
    volumes:
      - downloads:/downloads
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - internal

  frontend:
    build: ./frontend
    container_name: dlpx-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - internal
      - proxy_net

  # caddy:
  #   image: caddy:2-alpine
